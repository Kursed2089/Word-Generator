<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Learn vocabulary with AI-powered example sentences and definitions" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Word Explorer" />
  <title>Word Explorer</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .container {
      display: flex;
      gap: 20px;
      width: 100%;
      max-width: 1200px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      flex: 1;
      min-width: 300px;
    }

    .main-card {
      flex: 2;
      min-width: 360px;
    }

    .history-card {
      flex: 1;
      min-width: 280px;
      display: flex;
      flex-direction: column;
    }

    h1 {
      text-align: center;
      margin: 0 0 24px 0;
      font-size: 32px;
      color: #333;
      font-weight: 700;
    }

    h2 {
      font-size: 18px;
      color: #333;
      margin: 0 0 16px 0;
      font-weight: 600;
    }

    #word {
      font-size: 56px;
      text-align: center;
      font-weight: 700;
      margin: 20px 0;
      color: #667eea;
      word-break: break-word;
    }

    #sentence {
      text-align: center;
      font-style: italic;
      color: #666;
      margin-bottom: 24px;
      font-size: 15px;
      line-height: 1.5;
      min-height: 40px;
    }

    .controls {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      text-align: center;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .btn-danger {
      background: #ff6b6b;
      color: white;
      font-size: 12px;
      padding: 6px 10px;
    }

    .btn-danger:hover {
      background: #ee5a52;
    }

    #definition {
      margin-top: 20px;
      line-height: 1.8;
      color: #444;
      font-size: 14px;
    }

    #definition h3 {
      margin: 16px 0 8px 0;
      color: #667eea;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    #definition p {
      margin: 8px 0;
      padding-left: 12px;
      border-left: 3px solid #f0f0f0;
    }

    a.word-link {
      color: #667eea;
      cursor: pointer;
      text-decoration: none;
      font-weight: 500;
      border-bottom: 2px solid #667eea;
    }

    a.word-link:hover {
      color: #5568d3;
      border-bottom-color: #5568d3;
    }

    .save-btn-container {
      text-align: center;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #f0f0f0;
    }

    .save-btn-container button {
      width: 100%;
    }

    .save-status {
      font-size: 13px;
      color: #4caf50;
      margin-top: 8px;
      text-align: center;
      min-height: 18px;
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      border: 1px solid #f0f0f0;
      border-radius: 8px;
      padding: 0;
      margin-bottom: 12px;
      max-height: 400px;
    }

    .history-item {
      padding: 12px 14px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.15s;
    }

    .history-item:last-child {
      border-bottom: none;
    }

    .history-item:hover {
      background: #f9f9f9;
    }

    .history-word {
      font-weight: 600;
      color: #667eea;
    }

    .history-time {
      font-size: 12px;
      color: #999;
    }

    .history-remove {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      padding: 4px 6px;
      font-size: 16px;
      line-height: 1;
      transition: color 0.15s;
    }

    .history-remove:hover {
      color: #ff6b6b;
    }

    .empty-history {
      text-align: center;
      color: #999;
      padding: 24px 16px;
      font-size: 13px;
    }

    .clear-history-btn {
      width: 100%;
    }

    .loading {
      color: #999;
    }

    .error {
      color: #ff6b6b;
    }

    .offline-indicator {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #ff6b6b;
      color: white;
      padding: 8px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      z-index: 100;
      display: none;
    }

    .offline-indicator.show {
      display: block;
    }

    body.offline-mode {
      padding-top: 32px;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .card {
        padding: 24px;
      }

      #word {
        font-size: 40px;
      }

      h1 {
        font-size: 24px;
      }

      .controls {
        gap: 6px;
      }

      button {
        padding: 8px 12px;
        font-size: 13px;
      }
    }
  </style>
</head>

  function loadHistory() {

    wordHistory = saved ? JSON.parse(saved) : [];

  // Render history list with proper event delegation
  function renderHistory() {
    const historyList = document.getElementById('historyList');
    if (wordHistory.length === 0) {
      historyList.innerHTML = '<div class="empty-history">No words saved yet</div>';
      return;
    }

    historyList.innerHTML = ''; // Clear safely

    wordHistory.forEach((item, idx) => {
      const historyItem = document.createElement('div');
      historyItem.className = 'history-item';
      historyItem.dataset.wordIdx = idx;

      const wordInfo = document.createElement('div');
      const wordName = document.createElement('div');
      wordName.className = 'history-word';
      wordName.textContent = item.word; // Safe: textContent not innerHTML

      const wordTime = document.createElement('div');
      wordTime.className = 'history-time';
      wordTime.textContent = formatTime(item.timestamp);

      wordInfo.appendChild(wordName);
      wordInfo.appendChild(wordTime);

      const removeBtn = document.createElement('button');
      removeBtn.className = 'history-remove';
      removeBtn.textContent = '✕';
      removeBtn.dataset.removeIdx = idx;

      historyItem.appendChild(wordInfo);
      historyItem.appendChild(removeBtn);

      historyList.appendChild(historyItem);
    });

    // Add event delegation for history items
    historyList.addEventListener('click', (e) => {
      const removeBtn = e.target.closest('.history-remove');
      if (removeBtn) {
        const idx = parseInt(removeBtn.dataset.removeIdx);
        removeFromHistory(idx);
        return;
      }

      const historyItem = e.target.closest('.history-item');
      if (historyItem) {
        const idx = parseInt(historyItem.dataset.wordIdx);
        loadWord(wordHistory[idx].word);
      }
    });
  }

  function saveWord() {
    if (!currentWord) {
      showSaveStatus('No word to save', 'error', 2000);
      return;
    }

    const exists = wordHistory.some(item => item.word.toLowerCase() === currentWord.toLowerCase());
    if (exists) {
      showSaveStatus('Already saved ✓', 'info', 2000);
      return;
    }

    wordHistory.unshift({
      word: currentWord,
      timestamp: Date.now()
    });

    // Keep only last 50 words
    if (wordHistory.length > 50) {
      wordHistory = wordHistory.slice(0, 50);
    }

    localStorage.setItem('wordHistory', JSON.stringify(wordHistory));
    renderHistory();
    showSaveStatus('Saved to history! 📚', 'success', 2000);
  }

  // Show loading state
  function showLoading() {
    document.getElementById("word").textContent = "Loading...";
    document.getElementById("sentence").textContent = "";
    document.getElementById("definition").textContent = "";
  }

  // Disable buttons during loading
  function setLoadingState(isLoading) {
    document.getElementById("generateBtn").disabled = isLoading;
    document.getElementById("saveBtn").disabled = isLoading;
  }

  // Remove from history
  function removeFromHistory(idx) {
    wordHistory.splice(idx, 1);
    localStorage.setItem('wordHistory', JSON.stringify(wordHistory));
    renderHistory();
  }

  // Clear all history
  function clearHistory() {
    if (confirm('Clear all saved words?')) {
      wordHistory = [];
      localStorage.setItem('wordHistory', JSON.stringify(wordHistory));
      renderHistory();
    }
  }

  // Show save status message
  function showSaveStatus(message, type = 'success', duration = 2000) {
    const el = document.getElementById('saveStatus');
    el.textContent = message;
    el.className = 'save-status ' + (type === 'error' ? 'error' : type === 'info' ? 'info' : '');
    setTimeout(() => {
      el.textContent = '';
      el.className = 'save-status';
    }, duration);
  }

  // Safe HTML creation helper - avoids innerHTML injection risks
  function createSafeElement(tagName, content, className = '') {
    const el = document.createElement(tagName);
    el.textContent = content;
    if (className) el.className = className;
    return el;
  }

  // Build definition HTML safely without innerHTML
  function buildDefinitionHTML(meanings) {
    const container = document.createElement('div');
    
    meanings.forEach(m => {
      const header = document.createElement('h3');
      header.textContent = m.partOfSpeech;
      container.appendChild(header);

      m.definitions.slice(0, 2).forEach(d => {
        const p = document.createElement('p');
        // Use linkifyElement instead of innerHTML
        p.appendChild(linkifyElement(d.definition));
        container.appendChild(p);
      });
    });

    return container;
  }

  // Create paragraph with safe linkification
  function linkifyElement(text) {
    const fragment = document.createDocumentFragment();
    const parts = text.split(/\b([A-Za-z-]+)\b/);

    parts.forEach((part, idx) => {
      if (idx % 2 === 0) {
        // Regular text
        fragment.appendChild(document.createTextNode(part));
      } else {
        // Potential word link
        const lowerPart = part.toLowerCase();
        if (commonWords.has(lowerPart)) {
          fragment.appendChild(document.createTextNode(part));
        } else {
          const link = document.createElement('a');
          link.href = '#';
          link.className = 'word-link';
          link.textContent = part;
          link.dataset.word = lowerPart;
          fragment.appendChild(link);
        }
      }
    });

    return fragment;
  }

  // Format timestamp
  function formatTime(timestamp) {
    const now = Date.now();
    const diff = now - timestamp;
    const minutes = Math.floor(diff / 60000);
    const hours = Math.floor(diff / 3600000);
    const days = Math.floor(diff / 86400000);

    if (minutes < 1) return 'just now';
    if (minutes < 60) return `${minutes}m ago`;
    if (hours < 24) return `${hours}h ago`;
    if (days < 7) return `${days}d ago`;

    return new Date(timestamp).toLocaleDateString();
  }

  // Initialize event listeners
  document.getElementById("generateBtn").addEventListener("click", loadRandom);
  document.getElementById("speakBtn").addEventListener("click", speak);
  document.getElementById("backBtn").addEventListener("click", goBack);
  document.getElementById("clearBtn").addEventListener("click", clearDefinition);
  document.getElementById("saveBtn").addEventListener("click", saveWord);
  document.getElementById("clearHistoryBtn").addEventListener("click", clearHistory);
  document.getElementById("saveSettingsBtn").addEventListener("click", saveSettings);
  document.getElementById("downloadDictBtn").addEventListener("click", downloadDictionary);

  // Load URL parameter if present
  const params = new URLSearchParams(window.location.search);
  const urlWord = params.get("word");
  if (urlWord) {
    loadWord(urlWord); // No decodeURIComponent here, loadWord handles it
  }

  loadHistory();
  loadSettings();

  // Handle offline/online events
  window.addEventListener('offline', () => {
    document.getElementById("offlineIndicator").classList.add("show");
    document.body.classList.add("offline-mode");
  });

  window.addEventListener('online', () => {
    document.getElementById("offlineIndicator").classList.remove("show");
    document.body.classList.remove("offline-mode");
  });

  // Check initial online status
  if (!isOnline()) {
    document.getElementById("offlineIndicator").classList.add("show");
    document.body.classList.add("offline-mode");
  }

  // Built-in word list (no API needed, no CORS issues) - deduplicated
  const wordList = [
    "serendipity", "ephemeral", "eloquent", "ubiquitous", "pragmatic",
    "melancholy", "idyllic", "cacophony", "benevolent", "nostalgia",
    "ambiguous", "diligent", "esoteric", "obfuscate", "perspicacious",
    "sanguine", "taciturn", "meticulous", "sonorous",
    "pellucid", "obsequious", "inscrutable", "petulant", "salacious",
    "quixotic", "verbose", "pristine", "felicitous",
    "gregarious", "ostentatious", "perfunctory", "sagacious", "temerity",
    "zealous", "aggregate", "digress", "ebullient", "frivolous",
    "garrulous", "harbinger", "ignominious", "judicious", "kiss",
    "lackadaisical", "magnanimous", "nebulous", "obdurate", "parsimonious",
    "quandary", "recalcitrant", "transient", "unctuous",
    "vacuous", "winsome", "xenophobic", "yearn", "zephyr"
  ];

  // Pre-compute Set for O(1) lookup in linkify
  const wordListSet = new Set(wordList.map(w => w.toLowerCase()));

  async function loadRandom() {
    document.getElementById("word").textContent = "Loading...";
    document.getElementById("sentence").textContent = "";
    document.getElementById("definition").textContent = "";

    try {
      // Pick a random word from the built-in list
      const randomWord = wordList[Math.floor(Math.random() * wordList.length)];
      loadWord(randomWord);
    } catch (e) {
      showError("Error loading word. Try again.");
    }
  }

  // Event delegation for word links in definition
  document.addEventListener('click', (e) => {
    const wordLink = e.target.closest('.word-link');
    if (wordLink) {
      e.preventDefault();
      const word = wordLink.dataset.word;
      loadWord(word);
    }
  });

  function speak() {
    if (!currentWord) return;
    if ('speechSynthesis' in window) {
      const u = new SpeechSynthesisUtterance(currentWord);
      u.lang = "en-US";
      speechSynthesis.speak(u);
    }
  }

  function clearDefinition() {
    currentWord = "";
    resetNavigationStack();
    document.getElementById("word").textContent = "Click Generate Word";
    document.getElementById("sentence").textContent = "";
    document.getElementById("definition").textContent = "";
    document.getElementById("saveStatus").textContent = "";
    setLoadingState(false);
  }

  function goBack() {
    if (navigationStack.length > 1) {
      navigationStack.pop(); // Remove current word
      const previousWord = navigationStack[navigationStack.length - 1];
      loadWord(previousWord, true); // true = don't add to stack again
      updateBackButton();
    }
  }

  function updateBackButton() {
    const backBtn = document.getElementById("backBtn");
    // Show back button only if there's a history to go back to
    backBtn.style.display = navigationStack.length > 1 ? "inline-block" : "none";
  }

  function resetNavigationStack() {
    navigationStack = [];
    updateBackButton();
  }

  function showError(msg) {
    document.getElementById("word").textContent = "Error";
    document.getElementById("sentence").textContent = msg;
    document.getElementById("definition").textContent = "";
  }

  function loadSettings() {
    document.getElementById("ollamaUrl").value = localStorage.getItem('ollama_url') || 'http://localhost:11434';
    document.getElementById("ollamaModel").value = localStorage.getItem('ollama_model') || 'mistral';
    updateDictStatus();
  }

  function saveSettings() {
    const url = document.getElementById("ollamaUrl").value.trim();
    const model = document.getElementById("ollamaModel").value.trim();

    if (!url || !model) {
      alert('Please fill in both fields');
      return;
    }

    localStorage.setItem('ollama_url', url);
    localStorage.setItem('ollama_model', model);

    // Reload global vars
    window.location.reload();
  }

  // Download and cache offline dictionary to localStorage
  async function downloadDictionary() {
    const btn = document.getElementById("downloadDictBtn");
    const status = document.getElementById("dictStatus");
    
    btn.disabled = true;
    btn.textContent = "⬇️ Downloading...";
    status.textContent = "Downloading 1000 words...";

    try {
      // Store the offline dictionary
      localStorage.setItem('offlineDict', JSON.stringify(offlineDictionary));
      localStorage.setItem('offlineDictVersion', '1.0');
      
      btn.textContent = "✅ Downloaded";
      status.textContent = `Status: Downloaded (${Object.keys(offlineDictionary).length} words, ${Math.round(JSON.stringify(offlineDictionary).length / 1024)}KB)`;
      
      setTimeout(() => {
        btn.disabled = false;
        btn.textContent = "⬇️ Update Dictionary";
      }, 2000);
    } catch (e) {
      status.textContent = "Error downloading dictionary";
      btn.disabled = false;
      btn.textContent = "⬇️ Download Dictionary";
    }
  }

  // Check if offline dictionary is available
  function updateDictStatus() {
    const status = document.getElementById("dictStatus");
    const savedDict = localStorage.getItem('offlineDict');
    
    if (savedDict) {
      const dict = JSON.parse(savedDict);
      const size = Math.round(JSON.stringify(dict).length / 1024);
      status.textContent = `Status: Downloaded (${Object.keys(dict).length} words, ${size}KB)`;
      document.getElementById("downloadDictBtn").textContent = "✅ Update Dictionary";
    } else {
      status.textContent = "Status: Not downloaded";
    }
  }

  // Check if we're online
  function isOnline() {
    return navigator.onLine;
  }

  // Get definition from offline dictionary
  function getOfflineDefinition(word) {
    const savedDict = localStorage.getItem('offlineDict');
    if (!savedDict) return null;
    
    const dict = JSON.parse(savedDict);
    return dict[word];
  }

  async function loadWord(word, skipStack = false) {
    // Normalize word: decode if it's encoded, then lowercase
    if (typeof word === 'string' && word.includes('%')) {
      word = decodeURIComponent(word);
    }
    word = word.toLowerCase().trim();

    // Validate word
    if (!word) {
      showError("Invalid word");
      return;
    }

    currentWord = word;

    // Add to navigation stack if it's a new navigation (avoid duplicates)
    if (!skipStack) {
      const lastWord = navigationStack[navigationStack.length - 1];
      if (lastWord !== word) {
        navigationStack.push(word);
        // Limit stack to prevent memory issues
        if (navigationStack.length > 50) {
          navigationStack.shift();
        }
      }
    }
    updateBackButton();

    document.getElementById("word").textContent = word;
    document.getElementById("sentence").textContent = "Loading sentence...";
    document.getElementById("definition").innerHTML = "Loading definition...";
    document.getElementById("saveStatus").textContent = "";
    setLoadingState(true);

    // Fetch sentence from Ollama with caching and timeout
    if (cache.sentences.has(word)) {
      document.getElementById("sentence").innerHTML = cache.sentences.get(word);
    } else {
      try {
        document.getElementById("sentence").textContent = "Connecting to Ollama…";
        
        // Create abort controller for timeout
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000); // 10 second timeout
        
        const ollamaResponse = await fetch(`${OLLAMA_URL}/api/generate`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: OLLAMA_MODEL,
            prompt: `Create ONE natural, interesting example sentence using the word "${word}". The sentence should be realistic and engaging. Return ONLY the sentence, nothing else.`,
            stream: false
          }),
          signal: controller.signal
        });
        
        clearTimeout(timeoutId);
        
        if (ollamaResponse.ok) {
          const data = await ollamaResponse.json();
          let sentence = data.response.trim();
          
          // Safely bold the defined word using DOM manipulation
          const sentenceEl = document.getElementById("sentence");
          sentenceEl.textContent = ''; // Clear safely
          
          const parts = sentence.split(new RegExp(`\\b(${word})\\b`, 'gi'));
          parts.forEach((part, idx) => {
            if (idx % 2 === 1) {
              // This is the word match
              const strong = document.createElement('strong');
              strong.textContent = part;
              sentenceEl.appendChild(strong);
            } else {
              // Regular text
              sentenceEl.appendChild(document.createTextNode(part));
            }
          });
          
          cache.sentences.set(word, sentenceEl.innerHTML);
        } else {
          document.getElementById("sentence").textContent = `Example: "${word}" is used in many contexts.`;
        }
      } catch (e) {
        if (e.name === 'AbortError') {
          document.getElementById("sentence").textContent = `⚠️ Ollama request timed out. Check if it's running at ${OLLAMA_URL}`;
        } else {
          document.getElementById("sentence").textContent = `⚠️ Ollama not reachable at ${OLLAMA_URL}. Start it with: ollama run ${OLLAMA_MODEL}`;
        }
      }
    }

    // Fetch definition: try cache → offline → API
    if (cache.definitions.has(word)) {
      document.getElementById("definition").innerHTML = cache.definitions.get(word);
    } else {
      // Try offline dictionary first
      const offlineDef = getOfflineDefinition(word);
      if (offlineDef) {
        const defEl = document.getElementById("definition");
        defEl.textContent = ''; // Clear
        
        const header = document.createElement('h3');
        header.textContent = offlineDef.pos;
        defEl.appendChild(header);
        
        offlineDef.defs.forEach(def => {
          const p = document.createElement('p');
          p.appendChild(linkifyElement(def));
          defEl.appendChild(p);
        });
        
        cache.definitions.set(word, defEl.innerHTML);
      } else if (isOnline()) {
        // Fall back to API if online
        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 8000);
          
          const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`, {
            signal: controller.signal
          });
          
          clearTimeout(timeoutId);
          
          if (!res.ok) {
            document.getElementById("definition").textContent = "Definition unavailable offline.";
            return;
          }
          
          const data = await res.json();

          if (!Array.isArray(data) || data.length === 0) {
            document.getElementById("definition").textContent = "No definition found.";
            return;
          }

          const meanings = data[0].meanings;
          const defContainer = buildDefinitionHTML(meanings);
          
          const cachedHTML = defContainer.innerHTML;
          cache.definitions.set(word, cachedHTML);
          document.getElementById("definition").innerHTML = cachedHTML;
        } catch (e) {
          if (e.name === 'AbortError') {
            document.getElementById("definition").textContent = "Definition request timed out. Try again.";
          } else {
            document.getElementById("definition").textContent = "Definition unavailable offline.";
          }
        }
      } else {
        document.getElementById("definition").textContent = "📴 Offline mode: Word not in downloaded dictionary.";
      }
    }

    setLoadingState(false); // Re-enable buttons after loading
  }
</script>
